<header class="header">
  <div class="header-left">
    <div class="logo">{{ lang.t('title') }}</div>
    <div class="subtitle">{{ lang.t('subtitle') }}</div>
  </div>

  <div class="header-right">
    <!-- Sélecteur de langue -->
    <div class="lang-switcher">
      <button *ngFor="let l of langs"
              class="lang-btn"
              [class.active]="lang.lang() === l.code"
              (click)="setLang(l.code)">
        {{ l.label }}
      </button>
    </div>

    <!-- Table -->
    <div class="table-badge">
      <span class="dot"></span>
      {{ lang.t('table') }} {{ tableNumber }}
    </div>
  </div>
</header>
