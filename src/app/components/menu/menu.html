<!-- Header -->
<app-header [tableNumber]="tableNumber()"></app-header>

<!-- Barre panier -->
<div class="ribbon" [class.visible]="!cart.isEmpty()">
  <div class="ribbon-inner">
    <span>{{ cart.count() }} article{{ cart.count() > 1 ? 's' : '' }}</span>
    <span>{{ cart.total().toFixed(2) }} TND</span>
  </div>
</div>

<!-- Categories -->
<nav class="cats">
  <button
    *ngFor="let c of categories"
    class="cat"
    [class.active]="activeCategory() === c.id"
    (click)="setCategory(c.id)">
    {{ c.label }}
  </button>
</nav>

<!-- Chargement -->
<div *ngIf="loading()" class="loading">
  <div class="spinner"></div>
  <p>Chargement du menu...</p>
</div>

<!-- Menu -->
<div *ngIf="!loading()" class="menu-wrap">
  <section *ngFor="let group of groupedItems()">

    <!-- titre catégorie -->
    <div class="sec-head">
      <h2 class="sec-title">{{ group.label }}</h2>
      <div class="sec-line"></div>
    </div>

    <!-- articles -->
    <ul class="items-list">
      <li
        *ngFor="let item of group.items"
        class="item"
        [class.in-cart]="getQty(item._id) > 0">

        <span class="item-em">{{ item.emoji }}</span>

        <div class="item-body">
          <div class="item-name">
            {{ item.name }}
            <span *ngIf="item.badge"
                  class="badge"
                  [class]="'badge-' + item.badge">
              {{ badgeLabels[item.badge] }}
            </span>
          </div>
          <div class="item-desc">{{ item.description }}</div>
        </div>

        <div class="item-end">
          <div class="item-price">{{ item.price.toFixed(2) }} TND</div>
          <div class="stepper">
            <button class="step-btn" (click)="remove(item._id)">−</button>
            <span class="step-n">{{ getQty(item._id) }}</span>
            <button class="step-btn" (click)="add(item)">+</button>
          </div>
        </div>

      </li>
    </ul>
  </section>
</div>

<!-- Bouton flottant panier -->
<div class="float-wrap" [class.visible]="!cart.isEmpty()">
  <button class="float-btn" (click)="goToCart()">
    <span>🛒 {{ cart.count() }} article{{ cart.count() > 1 ? 's' : '' }}</span>
    <span class="float-sep"></span>
    <span>{{ cart.total().toFixed(2) }} TND</span>
  </button>
</div>
